version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: caseItau_api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/data/caseItau.db
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

volumes:
  sqlite_data:
