server {
    listen 80;

    location /api {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /otlp/ {
        proxy_pass http://otel-collector:4318/;
        proxy_set_header Host $host;
        proxy_set_header Cookie "";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
